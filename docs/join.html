<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>필람 보호 그룹 초대</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: #f9fafb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo { font-size: 52px; margin-bottom: 12px; }
    .app-name { font-size: 22px; font-weight: 700; color: #111827; margin-bottom: 4px; }
    .subtitle { font-size: 15px; color: #6b7280; margin-bottom: 32px; line-height: 1.5; }

    .code-label { font-size: 13px; font-weight: 600; color: #6b7280; margin-bottom: 10px; }
    .code-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 32px;
    }
    .code-box {
      width: 44px; height: 52px;
      background: #eff6ff;
      border: 2px solid #3b82f6;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 800;
      color: #1d4ed8;
      letter-spacing: 0;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      text-decoration: none;
      margin-bottom: 12px;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.88; }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-ios { background: #000; color: #fff; }
    .btn-android { background: #01875f; color: #fff; }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
    }
    .divider-line { flex: 1; height: 1px; background: #e5e7eb; }
    .divider-text { font-size: 13px; color: #9ca3af; }

    .expire-note { font-size: 13px; color: #9ca3af; margin-top: 4px; }
    .error-msg { font-size: 15px; color: #ef4444; font-weight: 600; }
    .trying-msg { font-size: 14px; color: #3b82f6; margin-bottom: 24px; }

    #section-open  { display: block; }
    #section-store { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">💊</div>
    <div class="app-name">필람</div>
    <div class="subtitle" id="invite-msg">보호 그룹 초대를 받으셨어요.<br>아래 코드로 참여할 수 있어요.</div>

    <div id="code-area">
      <div class="code-label">초대 코드</div>
      <div class="code-row" id="code-row"></div>
      <div class="expire-note">⏰ 24시간 유효 · 여러 명이 함께 사용 가능</div>
    </div>

    <!-- 앱이 설치된 경우 -->
    <div id="section-open">
      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-text">앱에서 바로 참여</div>
        <div class="divider-line"></div>
      </div>
      <button class="btn btn-primary" onclick="tryOpenApp()">필람 앱으로 참여하기</button>
      <div class="trying-msg" id="trying-msg" style="display:none">앱을 여는 중...</div>
    </div>

    <!-- 앱이 없는 경우 -->
    <div id="section-store">
      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-text">앱 설치 후 참여하세요</div>
        <div class="divider-line"></div>
      </div>
      <a class="btn btn-ios" id="link-ios" href="#">App Store에서 받기 (iOS)</a>
      <a class="btn btn-android" id="link-android" href="#">Google Play에서 받기 (Android)</a>
      <div class="expire-note" style="margin-top:12px">설치 후 앱을 열고 초대 코드를 입력하세요</div>
    </div>
  </div>

  <script>
    const APP_STORE    = 'https://apps.apple.com/kr/app/id6770390217';
    const PLAY_STORE   = 'https://play.google.com/store/apps/details?id=com.seungrokj.pillarm';
    const isIOS        = /iPhone|iPad|iPod/i.test(navigator.userAgent);
    const isAndroid    = /Android/i.test(navigator.userAgent);

    const params = new URLSearchParams(window.location.search);
    const code   = (params.get('code') || '').toUpperCase().replace(/[^A-Z0-9]/g, '');

    // Build code boxes
    const codeRow = document.getElementById('code-row');
    if (code && /^[A-Z0-9]{6}$/.test(code)) {
      code.split('').forEach((ch) => {
        const box = document.createElement('div');
        box.className = 'code-box';
        box.textContent = ch;
        codeRow.appendChild(box);
      });
    } else {
      document.getElementById('code-area').style.display = 'none';
      document.getElementById('invite-msg').textContent = '초대 링크가 올바르지 않습니다.';
      document.querySelector('.btn-primary').style.display = 'none';
    }

    // Store links
    document.getElementById('link-ios').href     = APP_STORE;
    document.getElementById('link-android').href = PLAY_STORE;

    // On mobile, hide irrelevant store button
    if (isIOS)     document.getElementById('link-android').style.display = 'none';
    if (isAndroid) document.getElementById('link-ios').style.display = 'none';

    let _tried = false;
    function tryOpenApp() {
      if (!code || _tried) return;
      _tried = true;

      document.getElementById('trying-msg').style.display = 'block';
      const deepLink = 'pillarm://join/' + code;
      window.location.href = deepLink;

      // If page is still visible after 2.5s, app is not installed
      setTimeout(() => {
        if (!document.hidden) {
          document.getElementById('trying-msg').style.display = 'none';
          document.getElementById('section-open').style.display = 'none';
          document.getElementById('section-store').style.display = 'block';
        }
      }, 2500);
    }

    // On mobile, auto-attempt deep link once (UX: one tap fewer)
    if ((isIOS || isAndroid) && code) {
      tryOpenApp();
    }
  </script>
</body>
</html>
